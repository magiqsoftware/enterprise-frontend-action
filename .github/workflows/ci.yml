name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        # The action runs the committed bundle, so it must match a fresh
        # build of src/. Only the runtime files are checked — source maps
        # are not byte-reproducible across environments.
        run: git diff --exit-code -- dist/index.js dist/cleanup.js

      - name: Lint
        run: npm run lint
